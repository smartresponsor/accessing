name: accessing

services:
  postgres:
    image: postgres:17-alpine
    container_name: accessing-postgres
    environment:
      POSTGRES_DB: ${ACCESSING_POSTGRES_DB:-accessing_test}
      POSTGRES_USER: ${ACCESSING_POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${ACCESSING_POSTGRES_PASSWORD:-app}
    ports:
      - "${ACCESSING_POSTGRES_PORT:-54329}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ACCESSING_POSTGRES_USER:-app} -d ${ACCESSING_POSTGRES_DB:-accessing_test}"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - accessing-postgres-data:/var/lib/postgresql/data

  php:
    build:
      context: ../..
      dockerfile: deploy/docker/php/Dockerfile
    container_name: accessing-php
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: test
      APP_DEBUG: "1"
      KERNEL_CLASS: App\\Kernel
      DATABASE_URL: "pgsql://${ACCESSING_POSTGRES_USER:-app}:${ACCESSING_POSTGRES_PASSWORD:-app}@postgres:5432/${ACCESSING_POSTGRES_DB:-accessing_test}?serverVersion=17&charset=utf8"
      MAILER_DSN: null://null
      ACCESSING_PHONE_VERIFICATION_PROVIDER: fake
      ACCESSING_PHONE_VERIFICATION_DSN: ""
    volumes:
      - ../..:/app
    profiles:
      - app
    command: ["php", "deploy/docker/bin/run-postgres-tests.php", "--inside-docker"]

volumes:
  accessing-postgres-data:
