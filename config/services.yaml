parameters:
  accessing.product_name: 'Accessing'

services:
  _defaults:
    autowire: true
    autoconfigure: true
    bind:
      $appSecret: '%env(APP_SECRET)%'
      $accessingSessionMaxIdleDays: 30
      $accessingVerificationCodeTtlMinutes: 15
      $accessingRecoveryCodeTtlMinutes: 30
      $accessingAccountLockThreshold: 5
      $accessingAccountLockMinutes: 15

  App\:
    resource: '../src/'
    exclude:
      - '../src/DependencyInjection/'
      - '../src/Entity/'
      - '../src/Kernel.php'

  Doctrine\Bundle\FixturesBundle\Loader\SymfonyFixturesLoader: '@doctrine.fixtures.loader'

  App\ServiceInterface\Account\AccessingAccountAuthenticationServiceInterface: '@App\Service\Account\AccessingAccountAuthenticationService'
  App\ServiceInterface\Account\AccessingAccountRegistrationServiceInterface: '@App\Service\Account\AccessingAccountRegistrationService'
  App\ServiceInterface\AccountSession\AccessingAccountSessionServiceInterface: '@App\Service\AccountSession\AccessingAccountSessionService'
  App\ServiceInterface\Credential\AccessingCredentialServiceInterface: '@App\Service\Credential\AccessingCredentialService'
  App\ServiceInterface\Recovery\AccessingRecoveryServiceInterface: '@App\Service\Recovery\AccessingRecoveryService'
  App\ServiceInterface\SecondFactor\AccessingSecondFactorServiceInterface: '@App\Service\SecondFactor\AccessingSecondFactorService'
  App\ServiceInterface\SecurityEvent\AccessingSecurityEventRecorderInterface: '@App\Service\SecurityEvent\AccessingSecurityEventRecorder'
  App\ServiceInterface\SecurityEvent\AccessingSecurityEventServiceInterface: '@App\Service\SecurityEvent\AccessingSecurityEventService'
  App\ServiceInterface\Vendor\AccessingPhoneVerificationProviderServiceInterface: '@App\Service\Vendor\AccessingPhoneVerificationGatewayService'
  App\ServiceInterface\Verification\AccessingVerificationChallengeServiceInterface: '@App\Service\Verification\AccessingVerificationChallengeService'
  App\RepositoryInterface\AccountRepositoryInterface: '@App\Repository\AccountRepository'
  App\RepositoryInterface\AccountSessionRepositoryInterface: '@App\Repository\AccountSessionRepository'
  App\RepositoryInterface\SecurityEventRepositoryInterface: '@App\Repository\SecurityEventRepository'
  App\RepositoryInterface\VerificationChallengeRepositoryInterface: '@App\Repository\VerificationChallengeRepository'

  App\Service\Vendor\AccessingPhoneVerificationGatewayService:
    arguments:
      $providers: !tagged_iterator 'app.accessing.phone_provider'
      $selectedProvider: '%env(default:fake:ACCESSING_PHONE_VERIFICATION_PROVIDER)%'

  App\Service\Vendor\AccessingFakePhoneVerificationProviderService:
    tags: ['app.accessing.phone_provider']

  App\Service\Vendor\AccessingNullPhoneVerificationProviderService:
    tags: ['app.accessing.phone_provider']
