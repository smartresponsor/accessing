monolog:
  channels:
    - 'accessing_security'

  handlers:
    main:
      type: stream
      path: '%kernel.logs_dir%/%kernel.environment%.log'
      level: debug
      channels: ['!event']

    console:
      type: console
      process_psr_3_messages: false
      channels: ['!event', '!doctrine', '!console']

    accessing_security:
      type: stream
      path: '%kernel.logs_dir%/accessing_security.log'
      level: info
      channels: ['accessing_security']
