security:
  password_hashers:
    Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

  role_hierarchy:
    ROLE_SUPPORT: ROLE_ACCOUNT

  providers:
    accessing_account_provider:
      entity:
        class: App\Accessing\Entity\Account
        property: email

  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false

    main:
      lazy: true
      provider: accessing_account_provider
      entry_point: App\Accessing\Security\AccessingAuthenticationEntryPoint
      two_factor:
        auth_form_path: 2fa_login
        check_path: 2fa_login_check
        default_target_path: accessing_overview
        enable_csrf: true
        csrf_token_id: two_factor

when@test:
  security:
    password_hashers:
      Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
        algorithm: auto
        cost: 4
        time_cost: 3
        memory_cost: 10
