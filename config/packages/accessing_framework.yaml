framework:
    secret: '%env(APP_SECRET)%'
    default_locale: en
    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
    csrf_protection: true
    form: true
    validation:
        email_validation_mode: html5
    router:
        utf8: true
    php_errors:
        log: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
