# Import this file from the host only when the component owns Doctrine entities.
# Entity classes remain component-owned and must not be used as external API contracts.
doctrine:
  orm:
    mappings:
      Accessing:
        type: attribute
        is_bundle: false
        dir: '%kernel.project_dir%/vendor/accessing/access/src/Entity'
        prefix: 'App\Accessing\Entity'
        alias: Accessing
